name: Auto Render Engineering Video

on:
  repository_dispatch:
    types: [render_and_upload]

jobs:
  build_video:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # FFmpeg aur uski libraries install karna
          sudo apt-get install -y ffmpeg libavcodec-extra
          
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # Sabhi zaroori libraries ek saath
          pip install moviepy==1.0.3 requests edge-tts urllib3

      - name: Run Video Rendering Script
        env:
          # Payload se data environment variables mein lena
          SCENES_DATA: ${{ github.event.client_payload.scenes_data }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          TITLE: ${{ github.event.client_payload.title }}
          DESCRIPTION: ${{ github.event.client_payload.description }}
          THUMBNAIL_PROMPT: ${{ github.event.client_payload.thumbnail_prompt }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }} 
        run: |
          # Script run karein
          python render_video.py
